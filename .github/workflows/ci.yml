name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify corpus is well-formed (no langchain needed)
        run: python scripts/verify_corpus.py

      - name: Import smoke test
        run: |
          python -c "from app.app import create_app; print('app imports OK')"
          python -c "from ingest.build_index import build_index; print('ingest imports OK')"
          python -c "from rag.pipeline import RAGPipeline; print('rag imports OK')"

      - name: Run pytest (fast tests only)
        env:
          # Tests don't actually call the Groq API, but config validation expects a key shape
          GROQ_API_KEY: gsk_dummy_key_for_ci
        run: pytest -q -m "not integration and not slow"

      - name: Build vector index (end-to-end ingestion check)
        env:
          GROQ_API_KEY: gsk_dummy_key_for_ci
        run: python -m ingest.build_index --rebuild
        continue-on-error: true

      - name: Verify index was built correctly
        run: |
          python -c "
          from langchain_chroma import Chroma
          from ingest.embedder import get_embedding_model
          from config import settings
          vs = Chroma(
              collection_name=settings.chroma_collection,
              persist_directory=str(settings.chroma_dir),
              embedding_function=get_embedding_model(settings.embedding_model),
          )
          count = vs._collection.count()
          assert count >= 30, f'Expected >= 30 chunks, got {count}'
          print(f'Index OK: {count} chunks')
          "

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only deploy on main branch pushes, and only if the RENDER_DEPLOY_HOOK secret exists
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret not set; skipping deploy"
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_HOOK"
          echo "Deploy triggered"
